<!DOCTYPE html>
<html lang="en" ng-app="quizApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizNova | The Future of Quizzing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075); border-radius: 0.5rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm" ng-controller="NavController">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#!/"><i class="bi bi-journal-code"></i> QuizNova</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" ng-if="!isAuthenticated">
                    <li class="nav-item"><a class="nav-link" href="#!/login">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="#!/signup">Sign Up</a></li>
                </ul>
                <ul class="navbar-nav ms-auto" ng-if="isAuthenticated">
                    <li class="nav-item"><a class="nav-link" href="#!/dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="#!/classes">Classes</a></li>
                    <li class="nav-item" ng-if="user.role === 'teacher'"><a class="nav-link" href="#!/students">Students</a></li>
                    <li class="nav-item"><a class="nav-link" href="#!/profile">Profile</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" ng-click="logout()">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5" ng-view>
        
    </div>

    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="app.js?v=2"></script>

    <script src="services/AuthService.js?v=2"></script>
    <script src="services/UserService.js?v=2"></script>
    <script src="services/QuizService.js?v=2"></script>
    <script src="services/ResultService.js?v=2"></script>

    <script src="controllers/NavController.js?v=2"></script>
    <script src="controllers/LoginController.js?v=2"></script>
    <script src="controllers/SignupController.js?v=2"></script>
    <script src="controllers/DashboardController.js?v=2"></script>
    <script src="controllers/CreateQuizController.js?v=2"></script>
    <script src="controllers/AddQuestionController.js?v=2"></script>
    <script src="controllers/QuizDetailsController.js?v=2"></script>
    <script src="controllers/AttemptQuizController.js?v=2"></script>
    <script src="controllers/ResultController.js?v=2"></script>
    <script src="controllers/HomeController.js?v=2"></script>
    <script src="controllers/ViewResultsController.js?v=2"></script>
    <script src="controllers/LeaderboardController.js?v=2"></script>
    <script src="controllers/StudentsController.js?v=2"></script>
    <script src="services/ClassService.js?v=2"></script>
    <script src="controllers/ClassesController.js?v=2"></script>
    <script src="controllers/ClassDetailsController.js?v=2"></script>
    <script src="controllers/ProfileController.js?v=2"></script>

</body>
</html>
