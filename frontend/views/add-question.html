<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm mb-4 border-0" ng-if="successMessage" style="border-radius: 1rem;">
                <div class="card-body bg-success text-white rounded text-center fw-bold fs-5">
                    <i class="bi bi-check-circle-fill"></i> {{ successMessage }}
                </div>
            </div>
            
            <div class="card shadow-lg border-0" style="border-radius: 1rem;">
                <div class="card-header bg-primary text-white py-3" style="border-top-left-radius: 1rem; border-top-right-radius: 1rem;">
                    <h4 class="mb-0"><i class="bi bi-patch-question"></i> Add Question to Quiz</h4>
                </div>
                <div class="card-body p-4">
                    <div class="alert alert-danger" ng-if="errorMessage">{{errorMessage}}</div>
                    
                    <form ng-submit="addQuestion()">
                        <div class="mb-4">
                            <label class="form-label fw-bold text-secondary">Question Text</label>
                            <input type="text" class="form-control form-control-lg bg-light" ng-model="question.questionText" required>
                        </div>
                        
                        <h5 class="mt-4 mb-3 fw-bold text-dark border-bottom pb-2">Options</h5>
                        <div class="mb-3 row" ng-repeat="option in question.options track by $index">
                            <label class="col-sm-2 col-form-label fw-semibold text-secondary">Option {{$index + 1}}</label>
                            <div class="col-sm-7">
                                <input type="text" class="form-control bg-light" ng-model="question.options[$index]" required>
                            </div>
                            <div class="col-sm-3 d-flex align-items-center">
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="correctAnswer" ng-model="question.correctAnswer" ng-value="$index" required style="cursor: pointer;">
                                    <label class="form-check-label text-success fw-bold">Correct</label>
                                </div>
                            </div>
                        </div>
                        
                        <div class="d-flex justify-content-between mt-5 pt-3 border-top">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold shadow-sm">
                                <i class="bi bi-plus-lg"></i> Add Question
                            </button>
                            <button type="button" class="btn btn-success btn-lg fw-bold shadow-sm" ng-click="finish()">
                                <i class="bi bi-check2-all"></i> Finish Setup
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            
            <div class="mt-5" ng-if="addedQuestions.length > 0">
                <h4 class="fw-bold text-dark border-bottom pb-2">Questions Added <span class="badge bg-primary rounded-pill">{{addedQuestions.length}}</span></h4>
                <div class="list-group shadow-sm mt-3" style="border-radius: 1rem;">
                    <div class="list-group-item list-group-item-action border-0 py-3" ng-repeat="q in addedQuestions track by $index">
                        <div class="d-flex w-100 justify-content-between">
                            <h6 class="mb-1 fw-bold text-dark">Q{{$index + 1}}: {{q.questionText}}</h6>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
