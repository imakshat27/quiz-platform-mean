<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card shadow-lg border-0 mb-4" style="border-radius: 1rem;">
                <div class="card-header bg-primary text-white py-4 text-center" style="border-top-left-radius: 1rem; border-top-right-radius: 1rem;">
                    <h2 class="mb-1 fw-bold">{{ quiz.title || 'Loading Quiz...' }}</h2>
                    <p class="mb-0 fs-5 opacity-75">{{ quiz.description }}</p>
                </div>
                
                <div class="card-body p-5">
                    <div class="alert alert-danger" ng-if="errorMessage">{{ errorMessage }}</div>
                    
                    <div ng-if="questions.length === 0 && !errorMessage" class="text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <p class="mt-3 text-muted">Loading questions or no questions available.</p>
                    </div>

                    <form ng-submit="submitQuiz()" ng-if="questions.length > 0">
                        <div class="card shadow-sm border-0 mb-4" style="border-radius: 0.75rem; background-color: #f8f9fa;" ng-repeat="q in questions track by $index">
                            <div class="card-body p-4">
                                <h5 class="fw-bold mb-4 text-dark"><span class="badge bg-primary rounded-pill me-2">Q{{$index + 1}}</span> {{q.questionText}}</h5>
                                
                                <div class="row g-3">
                                    <div class="col-md-6" ng-repeat="opt in q.options track by $index">
                                        <div class="form-check p-3 bg-white border rounded shadow-sm option-container" style="cursor: pointer; transition: all 0.2s;">
                                            <input class="form-check-input ms-1 me-2" type="radio" name="question{{$parent.$index}}" id="q{{$parent.$index}}opt{{$index}}" ng-model="userAnswers[$parent.$index]" ng-value="$index">
                                            <label class="form-check-label w-100 fw-semibold text-secondary" for="q{{$parent.$index}}opt{{$index}}" style="cursor: pointer;">
                                                {{opt}}
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="text-center mt-5 border-top pt-4">
                            <button type="submit" class="btn btn-success btn-lg px-5 fw-bold shadow-sm" style="border-radius: 2rem;">
                                Submit Quiz Answers <i class="bi bi-box-arrow-right ml-2"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<style>
    .option-container:hover { border-color: #0d6efd !important; background-color: #e9ecef !important; }
    .form-check-input:checked + .form-check-label { color: #0d6efd !important; font-weight: bold; }
</style>
