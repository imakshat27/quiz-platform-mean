<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg border-0" style="border-radius: 1rem;">
                <div class="card-header bg-primary text-white text-center py-4" style="border-top-left-radius: 1rem; border-top-right-radius: 1rem;">
                    <h3 class="mb-0 fw-bold"><i class="bi bi-pencil-square"></i> Create New Quiz</h3>
                </div>
                <div class="card-body p-5">
                    <div class="alert alert-danger" ng-if="errorMessage">{{ errorMessage }}</div>
                    
                    <form ng-submit="create()">
                        <div class="mb-4">
                            <label class="form-label fw-bold text-secondary">Quiz Title</label>
                            <input type="text" class="form-control form-control-lg bg-light" ng-model="quiz.title" required placeholder="E.g., JavaScript Basics">
                        </div>
                        
                        <div class="mb-5">
                            <label class="form-label fw-bold text-secondary">Description</label>
                            <textarea class="form-control bg-light" ng-model="quiz.description" rows="4" required placeholder="What is this quiz about?"></textarea>
                        </div>
                        
                        <div class="d-flex justify-content-between">
                            <a href="#!/dashboard" class="btn btn-outline-secondary btn-lg fw-bold px-4">Cancel</a>
                            <button type="submit" class="btn btn-primary btn-lg fw-bold px-5 shadow-sm">Save & Add Questions</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
