<div class="container py-4">
    <div class="mb-4 d-flex align-items-center gap-3">
        <button class="btn btn-outline-secondary" ng-click="goBack()">
            <i class="bi bi-arrow-left"></i> Back
        </button>
        <h3 class="fw-bold mb-0">🏆 Leaderboard — {{ quizTitle }}</h3>
    </div>

    <div class="alert alert-info" ng-if="loading">Loading leaderboard...</div>
    <div class="alert alert-warning" ng-if="!loading && entries.length === 0">
        No entries yet. Be the first to attempt this quiz!
    </div>

    <div class="card border-0 shadow-sm" style="border-radius: 1rem;" ng-if="!loading && entries.length > 0">
        <div class="card-body p-0">
            <table class="table table-hover mb-0" style="border-radius: 1rem; overflow: hidden;">
                <thead class="table-primary">
                    <tr>
                        <th class="ps-4">Rank</th>
                        <th>Participant</th>
                        <th>Score</th>
                        <th>Percentage</th>
                    </tr>
                </thead>
                <tbody>
                    <tr ng-repeat="entry in entries track by $index">
                        <td class="ps-4 fw-bold">
                            <span ng-if="$index === 0">🥇</span>
                            <span ng-if="$index === 1">🥈</span>
                            <span ng-if="$index === 2">🥉</span>
                            <span ng-if="$index > 2">{{ $index + 1 }}</span>
                        </td>
                        <td>{{ entry.participantName }}</td>
                        <td>{{ entry.score }} / {{ entry.totalQuestions }}</td>
                        <td>
                            <span class="badge"
                                ng-class="entry.percentage >= 50 ? 'bg-success' : 'bg-danger'">
                                {{ entry.percentage }}%
                            </span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
