<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-lg text-center" style="border-radius: 1.5rem;">
                <div class="card-body p-5">
                    <div class="mb-4">
                        <i class="bi bi-trophy-fill text-warning mb-3" style="font-size: 5rem;"></i>
                    </div>
                    <h2 class="fw-bold text-dark mb-2">Quiz Completed!</h2>
                    <p class="text-muted fs-5 mb-4">Great job, <strong>{{ result.participantName }}</strong>!</p>

                    <div class="d-inline-flex align-items-center justify-content-center bg-light rounded-circle mb-4 border shadow-sm" style="width: 140px; height: 140px;">
                        <h1 class="m-0 fw-bold display-4" ng-class="{'text-success': (result.score/result.totalQuestions) >= 0.5, 'text-danger': (result.score/result.totalQuestions) < 0.5}">
                            {{ result.score }}/{{ result.totalQuestions }}
                        </h1>
                    </div>

                    <div class="progress shadow-sm mb-5" style="height: 14px; border-radius: 7px;">
                        <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar"
                             ng-class="{'bg-success': (result.score/result.totalQuestions) >= 0.5, 'bg-danger': (result.score/result.totalQuestions) < 0.5}" 
                             ng-style="{'width': ((result.score / result.totalQuestions) * 100) + '%'}" 
                             aria-valuenow="{{ result.score }}" aria-valuemin="0" aria-valuemax="{{ result.totalQuestions }}">
                        </div>
                    </div>

                    <button class="btn btn-primary btn-lg w-100 fw-bold rounded-pill shadow-sm" ng-click="goHome()">
                        <i class="bi bi-house-door"></i> Return Home
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
<style>
    .result-card:hover { transform: translateY(-5px); box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15) !important; }
</style>
