<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card p-4 mt-5 border-0 shadow-lg" style="border-radius: 1rem;">
            <div class="text-center mb-4">
                <i class="bi bi-person-plus text-primary" style="font-size: 3rem;"></i>
                <h2 class="mt-2 fw-bold text-dark">Create Account</h2>
                <p class="text-muted">Join the quiz platform</p>
            </div>
            
            <div class="alert alert-danger" ng-if="errorMessage">{{ errorMessage }}</div>
            <div class="alert alert-success" ng-if="successMessage">{{ successMessage }}</div>
            
            <form ng-submit="signup()">
                <div class="mb-3">
                    <label class="form-label text-secondary fw-semibold">Full Name</label>
                    <input type="text" class="form-control form-control-lg bg-light" ng-model="user.name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-secondary fw-semibold">Email address</label>
                    <input type="email" id="email" class="form-control form-control-lg bg-light" ng-model="user.email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-secondary fw-semibold">Password</label>
                    <input type="password" id="password" class="form-control form-control-lg bg-light" ng-model="user.password" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-secondary fw-semibold">Role</label>
                    <select class="form-select form-select-lg bg-light" ng-model="user.role" required>
                        <option value="student">Student</option>
                        <option value="teacher">Teacher</option>
                    </select>
                </div>
                <div class="mb-3" ng-if="user.role === 'student'">
                    <label class="form-label text-secondary fw-semibold">Select Your Teacher</label>
                    <select class="form-select form-select-lg bg-light" ng-model="user.teacherId" required>
                        <option value="" disabled selected>-- Select a Teacher --</option>
                        <option ng-repeat="teacher in teachers" value="{{teacher._id}}">{{teacher.name}} ({{teacher.email}})</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">Sign Up</button>
            </form>
            
            <div class="text-center mt-4">
                <p class="text-muted">Already have an account? <a href="#!/login" class="text-primary fw-bold text-decoration-none">Login</a></p>
            </div>
        </div>
    </div>
</div>
